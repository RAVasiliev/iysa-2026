<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0e11" />
    <meta
      name="description"
      content="Фотографии IYSA 2026."
    />
    <title>IYSA 2026 — фотоархив</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=6" />
  </head>
  <body>
    <div class="site-shell">
      <header class="hero">
        <div class="hero-content">
          <div>
            <h1>IYSA<br /><em>2026</em></h1>
            <p class="intro">
              Крутейшие люди, крутейшая аналитика,<br />
              крутейшие путешествия!
            </p>
          </div>
          <div class="hero-note">
            <span class="note-mark">↘</span>
            <span>Листай ниже<br />и открывай фото крупно</span>
          </div>
        </div>
      </header>

      <main>
        <section id="gallery" class="gallery" aria-label="Фотографии IYSA 2026"></section>

        <div id="emptyState" class="empty-state" hidden aria-label="Фотографии скоро появятся"></div>
      </main>
    </div>

    <div class="lightbox" id="lightbox" hidden>
      <button class="lightbox-close" type="button" aria-label="Закрыть">×</button>
      <button class="lightbox-arrow lightbox-prev" type="button" aria-label="Предыдущее фото">←</button>
      <figure class="lightbox-figure">
        <img id="lightboxImage" alt="" />
      </figure>
      <button class="lightbox-arrow lightbox-next" type="button" aria-label="Следующее фото">→</button>
      <div class="lightbox-tools" aria-label="Действия с фотографией">
        <button class="like-button lightbox-like" id="lightboxLike" type="button" data-like-index="0" aria-pressed="false" aria-label="Поставить лайк">
          <span class="like-icon" aria-hidden="true">♡</span>
        </button>
        <a class="download-button lightbox-download" id="lightboxDownload" href="#" download aria-label="Скачать фотографию">
          <span aria-hidden="true">↓</span>
        </a>
      </div>
    </div>

    <script src="script.js?v=5" defer></script>
  </body>
</html>
